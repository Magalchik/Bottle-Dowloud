name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile download_bottles.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: download_bottles
          path: dist/download_bottles.exe
